<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>pixiv Portal</title>
    <style>
        :root {
            --pixiv-blue: #0096ff;
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
            --text-main: #1f1f1f;
            --text-sub: #7a8b9a;
            --border: #e5e9ef;
            --r18-red: #ff4d4f;
            --fav-orange: #ff9900;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo {
            font-weight: 800;
            font-size: 22px;
            color: var(--pixiv-blue);
            text-decoration: none;
            cursor: pointer;
        }

        .search-bar {
            display: flex;
            gap: 8px;
            flex: 1;
            max-width: 400px;
        }

        select,
        input,
        button {
            padding: 8px 12px;
            border: 1px solid #ccd5e0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        input {
            flex: 1;
        }

        button {
            background: var(--pixiv-blue);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #007ed6;
        }

        .nav-tabs {
            display: flex;
            gap: 8px;
        }

        .tab-btn {
            background: #e5e9ef;
            color: var(--text-main);
            font-size: 13px;
            padding: 8px 14px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
        }

        .tab-btn.active {
            background: var(--pixiv-blue);
            color: white;
            font-weight: bold;
        }

        .main-container {
            max-width: 1200px;
            margin: 24px auto;
            padding: 0 16px;
        }

        .loading {
            text-align: center;
            color: var(--pixiv-blue);
            font-weight: bold;
            display: none;
            margin: 40px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
        }

        .item-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: transform 0.2s;
            position: relative;
        }

        .item-card:hover {
            transform: translateY(-4px);
        }

        .thumb-box {
            width: 100%;
            aspect-ratio: 1/1;
            background: #eee;
            overflow: hidden;
        }

        .thumb-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .item-info {
            padding: 10px;
            font-size: 13px;
        }

        .item-title {
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .item-author {
            color: var(--text-sub);
            font-size: 11px;
        }

        .badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: var(--r18-red);
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;
            z-index: 10;
        }

        .novel-tag {
            background: #52c41a;
        }

        .detail-view {
            max-width: 800px;
            margin: 0 auto;
            display: none;
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .back-btn {
            background: #666;
        }

        .fav-btn {
            background: var(--fav-orange);
        }

        .fav-btn.is-fav {
            background: #999;
        }

        .view-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 32px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
        }

        .novel-body {
            font-size: 16px;
            line-height: 2.3;
            white-space: pre-wrap;
            letter-spacing: 0.05em;
        }

        .big-img {
            text-align: center;
        }

        .big-img img {
            max-width: 100%;
            border-radius: 8px;
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 16px;
            border-left: 4px solid var(--pixiv-blue);
            padding-left: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .list-box {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .list-item {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .list-item:hover {
            background: #f8f9fa;
        }

        .delete-small {
            background: #ff4d4f;
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .tag-badge {
            background: #e6f7ff;
            color: var(--pixiv-blue);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
            border: 1px solid #bae7ff;
            display: inline-block;
            margin: 4px;
        }

        .tag-badge:hover {
            background: #bae7ff;
        }

        .author-link {
            color: var(--pixiv-blue);
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
        }

        .author-link:hover {
            text-decoration: underline;
        }

        /* サブタブ (即時切り替えタブ) のスタイル */
        .sub-tabs-container {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        .sub-tab {
            cursor: pointer;
            padding: 8px 16px;
            font-weight: bold;
            color: var(--text-sub);
            position: relative;
            font-size: 14px;
            transition: color 0.2s;
        }

        .sub-tab:hover {
            color: var(--text-main);
        }

        .sub-tab.active {
            color: var(--pixiv-blue);
        }

        .sub-tab.active::after {
            content: '';
            position: absolute;
            bottom: -9px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--pixiv-blue);
        }

        .page-count-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;
            z-index: 10;
        }
    </style>
</head>

<body>

    <header>
        <a class="logo" onclick="switchTab('home')">pixiv</a>
        <div class="search-bar">
            <select id="searchType" onchange="toggleSearchModeSelect()">
                <option value="illust">イラスト</option>
                <option value="novel">小説</option>
                <option value="user">ユーザー</option>
            </select>
            <select id="searchMode">
                <option value="s_tag_full">タグ (完全一致)</option>
                <option value="s_tag">タグ (部分一致)</option>
                <option value="s_tc">タイトル・キャプション</option>
            </select>
            <select id="searchOrder">
                <option value="date_d">新着順</option>
                <option value="popular_d">人気順</option>
            </select>
            <input type="text" id="queryInput" placeholder="キーワードを入力...">
            <button onclick="startSearch()">検索</button>
        </div>
        <div class="nav-tabs">
            <button class="tab-btn active" id="tab-home" onclick="switchTab('home')">ホーム</button>
            <button class="tab-btn" id="tab-rank" onclick="switchTab('rank')">ランキング</button>
            <button class="tab-btn" id="tab-fav" onclick="switchTab('fav')">お気に入り</button>
            <button class="tab-btn" id="tab-history" onclick="switchTab('history')">履歴</button>
        </div>
    </header>

    <div class="main-container">
        <div id="loading" class="loading">コンテンツをデコード中...</div>

        <!-- 1. ホーム（おすすめ） -->
        <div id="homeView">
            <div class="sub-tabs-container">
                <span id="homeTab-illust" class="sub-tab active" onclick="switchHomeTab('illust')">イラスト</span>
                <span id="homeTab-novel" class="sub-tab" onclick="switchHomeTab('novel')">小説</span>
            </div>
            <div class="section-title" id="homeSectionTitle">あなたへのおすすめイラスト</div>
            <div class="grid" id="recommendGrid"></div>
        </div>

        <!-- 2. ランキング -->
        <div id="rankView" style="display:none;">
            <div class="section-title">
                <span>デイリーランキング</span>
                <select id="rankModeSelect" onchange="loadRanking()" style="padding:4px 8px; font-size:12px;">
                    <option value="day">全年齢デイリー</option>
                    <option value="day_male">男性人気</option>
                    <option value="day_female">女性人気</option>
                    <option value="day_r18">R-18 デイリー</option>
                    <option value="day_male_r18">R-18 男性人気</option>
                </select>
            </div>
            <div class="grid" id="rankGrid"></div>
        </div>

        <!-- 3. 検索結果 -->
        <div id="searchView" style="display:none;">
            <div class="sub-tabs-container">
                <span id="searchTab-illust" class="sub-tab active" onclick="switchSearchType('illust')">イラスト</span>
                <span id="searchTab-novel" class="sub-tab" onclick="switchSearchType('novel')">小説</span>
                <span id="searchTab-user" class="sub-tab" onclick="switchSearchType('user')">ユーザー</span>
            </div>
            <div class="grid" id="resultGrid"></div>
            <div id="searchPagination" class="pagination"
                style="display:none; text-align:center; margin:24px 0; align-items:center; justify-content:center; gap:16px;">
                <button id="searchPrevBtn" class="btn" style="background:#555; padding:8px 16px;">前へ</button>
                <span id="searchPageNum" style="color:var(--text-main); font-weight:bold; font-size:16px;">Page 1</span>
                <button id="searchNextBtn" class="btn" style="background:#555; padding:8px 16px;">次へ</button>
            </div>
        </div>

        <!-- 4. お気に入り -->
        <div id="favView" style="display:none;">
            <div class="section-title">お気に入り作品</div>
            <div class="grid" id="favGrid"></div>
        </div>

        <!-- 5. 履歴 -->
        <div id="historyView" style="display:none;">
            <div class="section-title">最近検索したキーワード</div>
            <div class="list-box" id="searchHistoryList"></div>
            <div class="section-title">最近閲覧した作品</div>
            <div class="grid" id="readHistoryGrid"></div>
        </div>

        <!-- 5.5 作者プロフィール画面 -->
        <div id="userView" style="display:none;">
            <div class="view-card" style="margin-bottom:24px; padding:24px;">
                <div style="display:flex; align-items:center; gap:20px;">
                    <img id="userAvatar" src=""
                        style="width:80px; height:80px; border-radius:50%; object-fit:cover; border:2px solid var(--border); background:#eee;">
                    <div style="flex:1;">
                        <h1 id="userProfileName" style="margin:0; font-size:22px; color:var(--text-main);"></h1>
                        <div id="userProfileComment"
                            style="margin-top:10px; font-size:14px; color:var(--text-sub); white-space:pre-wrap; max-height:150px; overflow-y:auto; line-height:1.6;">
                        </div>
                    </div>
                </div>
            </div>
            <div class="sub-tabs-container">
                <span id="userTab-illust" class="sub-tab active" onclick="switchUserTab('illust')">イラスト</span>
                <span id="userTab-novel" class="sub-tab" onclick="switchUserTab('novel')">小説</span>
            </div>
            <div class="section-title" id="userSectionTitle">イラスト作品一覧</div>
            <div class="grid" id="userGrid"></div>
            <div id="userPagination" class="pagination"
                style="text-align:center; margin:24px 0; display:flex; align-items:center; justify-content:center; gap:16px;">
                <button id="userPrevBtn" class="btn" style="background:#555; padding:8px 16px;">前へ</button>
                <span id="userPageNum" style="color:var(--text-main); font-weight:bold; font-size:16px;">Page 1</span>
                <button id="userNextBtn" class="btn" style="background:#555; padding:8px 16px;">次へ</button>
            </div>
        </div>

        <!-- 6. 詳細ビューア -->
        <div id="detailView" class="detail-view">
            <div class="action-bar">
                <button class="back-btn" onclick="goBack()">← 戻る</button>
                <button class="fav-btn" id="favActionBtn" onclick="toggleFavorite()">お気に入りに追加</button>
            </div>
            <div id="detailContent"></div>
        </div>
    </div>

    <script>
        const isGas = window.location.hostname.includes('script.google.com') || window.location.hostname.includes('googleusercontent.com');
        const GAS_URL = isGas ? window.location.href.split('?')[0] : '';
        let currentType = 'illust', currentItem = null, previousView = 'home';

        // 状態管理用の変数 (検索用)
        let currentSearchQuery = '';
        let currentSearchType = 'illust';
        let currentSearchPage = 1;

        // 状態管理用の変数 (作者ページ用)
        let currentUserId = '';
        let currentUserPage = 1;

        function getApiUrl(params) {
            const query = new URLSearchParams();
            if (isGas) {
                if (params.action === 'recommended' || params.action === 'ranking') {
                    query.set('type', 'custom');
                    query.set('apiType', params.action);
                    if (params.mode) query.set('mode', params.mode);
                } else if (params.action === 'search') {
                    query.set('type', 'search');
                    query.set('apiType', params.apiType);
                    query.set('word', params.word);
                    if (params.page) query.set('p', params.page);
                    if (params.s_mode) query.set('s_mode', params.s_mode);
                    if (params.order) query.set('order', params.order);
                } else if (params.action === 'novel_text') {
                    query.set('type', 'novel_body');
                    query.set('id', params.id);
                } else if (params.action === 'image') {
                    query.set('type', 'image');
                    query.set('url', params.url || '');
                }
                return `${GAS_URL}?${query.toString()}`;
            } else {
                if (params.action === 'recommended') {
                    query.set('type', 'recommended');
                } else if (params.action === 'ranking') {
                    query.set('type', 'ranking');
                    if (params.mode) query.set('mode', params.mode);
                } else if (params.action === 'search') {
                    query.set('type', params.apiType);
                    query.set('word', params.word);
                    if (params.page) query.set('p', params.page);
                    if (params.s_mode) query.set('s_mode', params.s_mode);
                    if (params.order) query.set('order', params.order);
                } else if (params.action === 'novel_text') {
                    query.set('type', 'novel_text');
                    query.set('id', params.id);
                } else if (params.action === 'image') {
                    query.set('type', 'image');
                    query.set('url', params.url || '');
                } else if (params.action === 'user_detail') {
                    query.set('type', 'user_detail');
                    query.set('id', params.id);
                } else if (params.action === 'user_illusts') {
                    query.set('type', 'user_illusts');
                    query.set('id', params.id);
                    if (params.page) query.set('p', params.page);
                }
                return `/api?${query.toString()}`;
            }
        }

        function runGasServer(funcName, ...args) {
            return new Promise((resolve, reject) => {
                if (typeof google === 'undefined' || !google.script || !google.script.run) {
                    reject(new Error('google.script.run is not available'));
                    return;
                }
                google.script.run
                    .withSuccessHandler(result => resolve(result))
                    .withFailureHandler(error => reject(error))[funcName](...args);
            });
        }

        async function loadImageToElement(imgElement, origUrl) {
            if (!origUrl) return;
            if (!isGas) {
                imgElement.src = getApiUrl({ action: 'image', url: origUrl });
                return;
            }
            imgElement.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 100 100'><rect width='100%' height='100%' fill='%23eee'/></svg>";
            try {
                const resText = await runGasServer('getImageBase64', origUrl);
                const data = JSON.parse(resText);
                if (data.base64) {
                    imgElement.src = `data:${data.contentType || 'image/jpeg'};base64,${data.base64}`;
                }
            } catch (e) {
                console.error('Failed to load image via GAS Base64:', e);
            }
        }

        window.onload = function () {
            if (!localStorage.getItem('pixiv_favs')) localStorage.setItem('pixiv_favs', JSON.stringify([]));
            if (!localStorage.getItem('search_history')) localStorage.setItem('search_history', JSON.stringify([]));
            if (!localStorage.getItem('read_history')) localStorage.setItem('read_history', JSON.stringify([]));
            toggleSearchModeSelect(); // 検索オプション表示制御
            switchTab('home'); // 初回おすすめ読み込み
        };

        async function switchTab(viewName) {
            const views = ['home', 'rank', 'search', 'fav', 'history', 'detail', 'user'];
            views.forEach(v => {
                const el = document.getElementById(`${v}View`);
                if (el) el.style.display = (v === viewName) ? 'block' : 'none';
            });

            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            const activeTab = document.getElementById(`tab-${viewName}`);
            if (activeTab) activeTab.classList.add('active');

            if (viewName === 'home') switchHomeTab(currentHomeTab);
            if (viewName === 'rank') loadRanking();
            if (viewName === 'fav') renderFavorites();
            if (viewName === 'history') renderHistory();
        }

        function toggleSearchModeSelect() {
            const type = document.getElementById('searchType').value;
            const searchMode = document.getElementById('searchMode');
            const searchOrder = document.getElementById('searchOrder');
            if (type === 'user') {
                searchMode.style.display = 'none';
                searchOrder.style.display = 'none';
            } else {
                searchMode.style.display = 'inline-block';
                searchOrder.style.display = 'inline-block';
            }
        }

        let currentHomeTab = 'illust';
        async function switchHomeTab(type) {
            currentHomeTab = type;
            document.querySelectorAll('#homeView .sub-tab').forEach(el => el.classList.remove('active'));
            const activeEl = document.getElementById(`homeTab-${type}`);
            if (activeEl) activeEl.classList.add('active');

            const grid = document.getElementById('recommendGrid'), loading = document.getElementById('loading');
            const titleEl = document.getElementById('homeSectionTitle');
            grid.innerHTML = '';

            if (type === 'illust') {
                titleEl.innerText = 'あなたへのおすすめイラスト';
                loadRecommendations();
            } else {
                titleEl.innerText = 'あなたへのおすすめ小説';
                loading.style.display = 'block';
                try {
                    let data;
                    if (isGas) {
                        const resText = await runGasServer('getRecommendedNovels');
                        data = JSON.parse(resText);
                    } else {
                        const res = await fetch(getApiUrl({ action: 'recommended_novel' }));
                        data = await res.json();
                    }
                    renderGridItems(data.novels, grid, 'novel');
                } catch (e) {
                    grid.innerHTML = '<p>読み込み失敗</p>';
                } finally {
                    loading.style.display = 'none';
                }
            }
        }

        function goBack() { switchTab(previousView); }

        // おすすめの読み込み
        async function loadRecommendations() {
            const grid = document.getElementById('recommendGrid'), loading = document.getElementById('loading');
            if (grid.children.length > 0) return;
            loading.style.display = 'block';
            try {
                let data;
                if (isGas) {
                    const resText = await runGasServer('getRecommended');
                    data = JSON.parse(resText);
                } else {
                    const res = await fetch(getApiUrl({ action: 'recommended' }));
                    data = await res.json();
                }
                renderGridItems(data.illusts, grid, 'illust');
            } catch (e) { grid.innerHTML = '<p>読み込み失敗</p>'; }
            finally { loading.style.display = 'none'; }
        }

        // ランキングの読み込み
        async function loadRanking() {
            const grid = document.getElementById('rankGrid'), loading = document.getElementById('loading');
            const mode = document.getElementById('rankModeSelect').value;
            grid.innerHTML = '';
            loading.style.display = 'block';
            try {
                let data;
                if (isGas) {
                    const resText = await runGasServer('getRanking', mode);
                    data = JSON.parse(resText);
                } else {
                    const res = await fetch(getApiUrl({ action: 'ranking', mode }));
                    data = await res.json();
                }
                renderGridItems(data.illusts, grid, 'illust');
            } catch (e) { grid.innerHTML = '<p>読み込み失敗</p>'; }
            finally { loading.style.display = 'none'; }
        }

        // 検索機能
        async function startSearch(forcedWord = null, page = 1) {
            switchTab('search'); previousView = 'search';
            const type = document.getElementById('searchType').value;
            const word = forcedWord || document.getElementById('queryInput').value.trim();
            if (forcedWord) document.getElementById('queryInput').value = word;

            const grid = document.getElementById('resultGrid'), loading = document.getElementById('loading');
            const pagination = document.getElementById('searchPagination');

            if (!word) return alert('キーワードを入力してください');

            currentSearchQuery = word;
            currentSearchType = type;
            currentSearchPage = page;

            grid.innerHTML = '';
            loading.style.display = 'block';
            pagination.style.display = 'none';

            saveSearchHistory(word, type);

            // サブタブのアクティブ状態更新
            document.querySelectorAll('#searchView .sub-tab').forEach(el => el.classList.remove('active'));
            const activeSubTab = document.getElementById(`searchTab-${type}`);
            if (activeSubTab) activeSubTab.classList.add('active');

            const s_mode = document.getElementById('searchMode').value;
            const order = document.getElementById('searchOrder').value;

            try {
                if (type === 'user') {
                    let data;
                    if (isGas) {
                        const resText = await runGasServer('searchUsers', word, page);
                        data = JSON.parse(resText);
                    } else {
                        const res = await fetch(getApiUrl({ action: 'search', apiType: 'search_user', word, page }));
                        data = await res.json();
                    }
                    const users = data.users || [];
                    if (users.length === 0) {
                        grid.innerHTML = '<p>ユーザーが見つかりませんでした。</p>';
                        return;
                    }
                    renderUserGridItems(users, grid);
                    setupSearchPagination(users.length >= 10);
                } else {
                    const apiType = type === 'illust' ? 'search_illust' : 'search_novel';
                    let data;
                    if (isGas) {
                        const resText = await runGasServer('searchIllustOrNovel', apiType, word, page, s_mode, order);
                        data = JSON.parse(resText);
                    } else {
                        const res = await fetch(getApiUrl({ action: 'search', apiType, word, page, s_mode, order }));
                        data = await res.json();
                    }
                    const items = type === 'illust' ? data.illusts : data.novels;
                    if (!items || items.length === 0) {
                        grid.innerHTML = '<p>作品が見つかりませんでした。</p>';
                        return;
                    }
                    renderGridItems(items, grid, type);
                    setupSearchPagination(items.length >= 15);
                }
            } catch (err) {
                grid.innerHTML = `<p style="color:red;">エラー: ${err.message}</p>`;
            } finally {
                loading.style.display = 'none';
            }
        }

        function switchSearchType(type) {
            document.getElementById('searchType').value = type;
            toggleSearchModeSelect();
            startSearch(currentSearchQuery, 1);
        }

        function setupSearchPagination(hasNext) {
            const pagination = document.getElementById('searchPagination');
            const prevBtn = document.getElementById('searchPrevBtn');
            const nextBtn = document.getElementById('searchNextBtn');
            const pageNum = document.getElementById('searchPageNum');

            pagination.style.display = 'flex';
            pageNum.innerText = `Page ${currentSearchPage}`;

            prevBtn.disabled = currentSearchPage <= 1;
            prevBtn.onclick = () => {
                if (currentSearchPage > 1) {
                    startSearch(currentSearchQuery, currentSearchPage - 1);
                }
            };

            nextBtn.disabled = !hasNext;
            nextBtn.onclick = () => {
                startSearch(currentSearchQuery, currentSearchPage + 1);
            };
        }

        function renderGridItems(items, targetGrid, type) {
            targetGrid.innerHTML = '';
            if (!items) return;
            items.forEach(item => {
                const card = document.createElement('div'); card.className = 'item-card';
                let badgeHtml = '';
                if (item.x_restrict === 1) badgeHtml = '<div class="badge">R-18</div>';
                let badgeLeft = 50;
                if (type === 'novel' || item._type === 'novel') {
                    badgeHtml += `<div class="badge novel-tag" style="left:${badgeLeft}px;">小説</div>`;
                    badgeLeft += 50;
                }
                if (item.is_popular) {
                    badgeHtml += `<div class="badge popular-tag" style="left:${badgeLeft}px; background:#ff9900;">人気</div>`;
                }

                // 複数枚画像バッジ
                const pageCount = item.page_count || item.pageCount || 1;
                let pageBadge = '';
                if ((type === 'illust' || item._type === 'illust') && pageCount > 1) {
                    pageBadge = `<div class="page-count-badge">${pageCount}P</div>`;
                }

                const origThumb = (type === 'illust' || item._type === 'illust') ? item?.image_urls?.square_medium : item?.image_urls?.large;
                card.innerHTML = `
                    ${badgeHtml}
                    ${pageBadge}
                    <div class="thumb-box"><img id="img-${item.id}" loading="lazy"></div>
                    <div class="item-info">
                        <div class="item-title">${item.title}</div>
                        <div class="item-author">
                            by <span class="author-link" onclick="event.stopPropagation(); openUserPage('${item.user.id}')">${item.user.name}</span>
                        </div>
                    </div>
                `;
                card.onclick = () => openDetail(item, item._type || type);
                targetGrid.appendChild(card);

                setTimeout(() => {
                    const imgEl = card.querySelector(`#img-${item.id}`);
                    if (imgEl) loadImageToElement(imgEl, origThumb);
                }, 0);
            });
        }

        function renderUserGridItems(users, targetGrid) {
            targetGrid.innerHTML = '';
            if (!users) return;
            users.forEach(user => {
                const card = document.createElement('div'); card.className = 'item-card';
                card.style.display = 'flex';
                card.style.flexDirection = 'column';
                card.style.alignItems = 'center';
                card.style.padding = '16px 8px';

                const avatarId = `avatar-${user.id}`;
                card.innerHTML = `
                    <div style="width:90px; height:90px; border-radius:50%; overflow:hidden; background:#eee; margin-bottom:12px;">
                        <img id="${avatarId}" style="width:100%; height:100%; object-fit:cover;">
                    </div>
                    <div style="font-weight:bold; font-size:14px; text-align:center; margin-bottom:6px; color:var(--text-main); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; width:100%;">${user.name}</div>
                    <div style="font-size:11px; color:var(--text-sub); text-align:center; overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; height:32px; line-height:1.45; width:100%; padding:0 4px;">${user.comment || '紹介文なし'}</div>
                `;
                card.onclick = () => openUserPage(user.id);
                targetGrid.appendChild(card);

                setTimeout(() => {
                    const imgEl = card.querySelector(`#${avatarId}`);
                    if (imgEl) loadImageToElement(imgEl, user.avatar);
                }, 0);
            });
        }

        async function openDetail(item, type) {
            const activeView = ['home', 'rank', 'search', 'fav', 'history', 'user'].find(v => {
                const el = document.getElementById(`${v}View`);
                return el && el.style.display === 'block';
            });
            if (activeView) previousView = activeView;

            switchTab('detail');
            const content = document.getElementById('detailContent'), loading = document.getElementById('loading');
            content.innerHTML = '';
            currentItem = item; currentItem._type = type; currentType = type;
            updateFavButtonState(); saveReadHistory(item, type);

            // タグ一覧の生成
            const tagsHtml = (item.tags || []).map(tag => {
                const name = typeof tag === 'string' ? tag : (tag.name || tag.tag);
                return `<span class="tag-badge" onclick="searchByTag('${name}')">#${name}</span>`;
            }).join('');

            if (type === 'illust') {
                const pageCount = item.page_count || item.pageCount || 1;

                if (pageCount > 1) {
                    content.innerHTML = `
                        <div class="view-card big-img">
                            <h1 style="font-size:22px; margin-bottom:8px;">${item.title}</h1>
                            <p style="color:var(--text-sub); margin-bottom:16px;">
                                ユーザー: <span class="author-link" onclick="openUserPage('${item.user.id}')">${item.user.name}</span>
                            </p>
                            <div style="margin-bottom:20px; display:flex; flex-wrap:wrap; justify-content:center; gap:4px;">${tagsHtml}</div>
                            <div id="pagesList" style="display:flex; flex-direction:column; gap:24px; align-items:center; width:100%;">
                                <p style="color:var(--text-sub);">全 ${pageCount} ページの画像をロード中...</p>
                            </div>
                            <p style="text-align:left; white-space:pre-wrap; margin-top:30px; font-size:14px; color:var(--text-main); line-height:1.6;">${item.caption || ''}</p>
                        </div>
                    `;

                    setTimeout(async () => {
                        try {
                            let pagesData;
                            if (isGas) {
                                const pagesText = await runGasServer('getIllustPages', item.id);
                                pagesData = JSON.parse(pagesText);
                            } else {
                                const res = await fetch(getApiUrl({ action: 'illust_pages', id: item.id }));
                                pagesData = await res.json();
                            }

                            const pagesList = content.querySelector('#pagesList');
                            pagesList.innerHTML = '';

                            (pagesData.pages || []).forEach((pageObj, index) => {
                                const pageWrapper = document.createElement('div');
                                pageWrapper.style.width = '100%';
                                pageWrapper.style.textAlign = 'center';
                                pageWrapper.style.position = 'relative';
                                pageWrapper.innerHTML = `
                                    <img id="detailImg-${item.id}-${index}" style="max-width:100%; border-radius:8px; display:block; margin:0 auto;" referrerpolicy="no-referrer">
                                    <div style="margin-top:8px; font-size:12px; color:var(--text-sub); font-weight:bold;">${index + 1} / ${pageCount} ページ</div>
                                `;
                                pagesList.appendChild(pageWrapper);

                                const imgEl = pageWrapper.querySelector(`#detailImg-${item.id}-${index}`);
                                if (imgEl) loadImageToElement(imgEl, pageObj.urls.large);
                            });
                        } catch (e) {
                            console.error('Failed to load multi pages:', e);
                            content.querySelector('#pagesList').innerHTML = '<p style="color:red;">画像の読み込みに失敗しました。</p>';
                        }
                    }, 0);
                } else {
                    const bigImgUrl = item?.meta_single_page?.original_image_url || item?.image_urls?.large;
                    content.innerHTML = `
                        <div class="view-card big-img">
                            <h1 style="font-size:22px; margin-bottom:8px;">${item.title}</h1>
                            <p style="color:var(--text-sub); margin-bottom:16px;">
                                ユーザー: <span class="author-link" onclick="openUserPage('${item.user.id}')">${item.user.name}</span>
                            </p>
                            <div style="margin-bottom:20px; display:flex; flex-wrap:wrap; justify-content:center; gap:4px;">${tagsHtml}</div>
                            <img id="detailImg" referrerpolicy="no-referrer">
                            <p style="text-align:left; white-space:pre-wrap; margin-top:20px; font-size:14px; color:var(--text-main); line-height:1.6;">${item.caption || ''}</p>
                        </div>
                    `;

                    setTimeout(() => {
                        const imgEl = content.querySelector('#detailImg');
                        if (imgEl) loadImageToElement(imgEl, bigImgUrl);
                    }, 0);
                }
            } else {
                loading.style.display = 'block';
                try {
                    let data;
                    if (isGas) {
                        const resText = await runGasServer('getNovelText', item.id);
                        data = JSON.parse(resText);
                    } else {
                        const res = await fetch(getApiUrl({ action: 'novel_text', id: item.id }));
                        data = await res.json();
                    }
                    content.innerHTML = `
                        <div class="view-card">
                            <h1 style="font-size:22px; margin-bottom:8px;">${item.title}</h1>
                            <p style="color:var(--text-sub); margin-bottom:16px;">
                                著者: <span class="author-link" onclick="openUserPage('${item.user.id}')">${item.user.name}</span>
                            </p>
                            <div style="margin-bottom:20px; display:flex; flex-wrap:wrap; gap:4px;">${tagsHtml}</div>
                            <hr style="border:0; border-top:1px solid var(--border); margin:20px 0;">
                            <div class="novel-body">${data.novel_text}</div>
                        </div>
                    `;
                } catch (err) { content.innerHTML = `<p style="color:red;">本文の読み込みに失敗しました。</p>`; }
                finally { loading.style.display = 'none'; }
            }
        }

        function searchByTag(tagName) {
            document.getElementById('searchType').value = currentType === 'novel' ? 'novel' : 'illust';
            document.getElementById('searchMode').value = 's_tag_full';
            document.getElementById('searchOrder').value = 'date_d';
            toggleSearchModeSelect();
            startSearch(tagName, 1);
        }

        let currentUserTab = 'illust';
        function switchUserTab(type) {
            currentUserTab = type;
            document.querySelectorAll('#userView .sub-tab').forEach(el => el.classList.remove('active'));
            const activeEl = document.getElementById(`userTab-${type}`);
            if (activeEl) activeEl.classList.add('active');

            const titleEl = document.getElementById('userSectionTitle');
            titleEl.innerText = type === 'illust' ? 'イラスト作品一覧' : '小説作品一覧';

            openUserPage(currentUserId, 1);
        }

        async function openUserPage(userId, page = 1) {
            const activeView = ['home', 'rank', 'search', 'fav', 'history', 'detail', 'user'].find(v => {
                const el = document.getElementById(`${v}View`);
                return el && el.style.display === 'block';
            });
            if (activeView && activeView !== 'user') previousView = activeView;

            switchTab('user');

            currentUserId = userId;
            currentUserPage = page;

            const grid = document.getElementById('userGrid'), loading = document.getElementById('loading');
            const avatar = document.getElementById('userAvatar');
            const nameEl = document.getElementById('userProfileName');
            const commentEl = document.getElementById('userProfileComment');
            const pagination = document.getElementById('userPagination');

            grid.innerHTML = '';
            pagination.style.display = 'none';

            if (page === 1) {
                // サブタブを「イラスト」に初期化
                currentUserTab = 'illust';
                document.querySelectorAll('#userView .sub-tab').forEach(el => el.classList.remove('active'));
                const activeEl = document.getElementById('userTab-illust');
                if (activeEl) activeEl.classList.add('active');
                document.getElementById('userSectionTitle').innerText = 'イラスト作品一覧';

                avatar.src = '';
                nameEl.innerText = '読み込み中...';
                commentEl.innerHTML = '';

                try {
                    let userDetail;
                    if (isGas) {
                        const detailText = await runGasServer('getUserDetail', userId);
                        userDetail = JSON.parse(detailText);
                    } else {
                        const res = await fetch(getApiUrl({ action: 'user_detail', id: userId }));
                        userDetail = await res.json();
                    }
                    nameEl.innerText = userDetail.name;
                    commentEl.innerHTML = userDetail.comment || '紹介文はありません。';

                    if (userDetail.avatar) {
                        loadImageToElement(avatar, userDetail.avatar);
                    }
                } catch (e) {
                    nameEl.innerText = '情報取得失敗';
                    console.error('Failed to load user detail:', e);
                }
            }

            loading.style.display = 'block';
            try {
                let data;
                if (currentUserTab === 'illust') {
                    if (isGas) {
                        const resText = await runGasServer('getUserIllusts', userId, page);
                        data = JSON.parse(resText);
                    } else {
                        const res = await fetch(getApiUrl({ action: 'user_illusts', id: userId, page }));
                        data = await res.json();
                    }
                    renderGridItems(data.illusts, grid, 'illust');
                } else {
                    if (isGas) {
                        const resText = await runGasServer('getUserNovels', userId, page);
                        data = JSON.parse(resText);
                    } else {
                        const res = await fetch(getApiUrl({ action: 'user_novels', id: userId, page }));
                        data = await res.json();
                    }
                    renderGridItems(data.novels, grid, 'novel');
                }

                const total = data.total || 0;

                if ((currentUserTab === 'illust' && (!data.illusts || data.illusts.length === 0)) ||
                    (currentUserTab === 'novel' && (!data.novels || data.novels.length === 0))) {
                    grid.innerHTML = '<p>公開されている作品がありません。</p>';
                    return;
                }

                const hasNext = (page * 24) < total;
                setupUserPagination(hasNext);
            } catch (err) {
                grid.innerHTML = `<p style="color:red;">作品一覧の取得に失敗しました: ${err.message}</p>`;
            } finally {
                loading.style.display = 'none';
            }
        }

        function setupUserPagination(hasNext) {
            const pagination = document.getElementById('userPagination');
            const prevBtn = document.getElementById('userPrevBtn');
            const nextBtn = document.getElementById('userNextBtn');
            const pageNum = document.getElementById('userPageNum');

            pagination.style.display = 'flex';
            pageNum.innerText = `Page ${currentUserPage}`;

            prevBtn.disabled = currentUserPage <= 1;
            prevBtn.onclick = () => {
                if (currentUserPage > 1) {
                    openUserPage(currentUserId, currentUserPage - 1);
                }
            };

            nextBtn.disabled = !hasNext;
            nextBtn.onclick = () => {
                openUserPage(currentUserId, currentUserPage + 1);
            };
        }

        function getFavs() { return JSON.parse(localStorage.getItem('pixiv_favs')) || []; }
        function updateFavButtonState() {
            const favs = getFavs(), isFav = favs.some(f => f.id === currentItem.id && f._type === currentItem._type), btn = document.getElementById('favActionBtn');
            if (isFav) { btn.innerText = '★ お気に入りを解除'; btn.classList.add('is-fav'); } else { btn.innerText = '★ お気に入りに追加'; btn.classList.remove('is-fav'); }
        }
        function toggleFavorite() {
            let favs = getFavs(); const index = favs.findIndex(f => f.id === currentItem.id && f._type === currentItem._type);
            if (index > -1) favs.splice(index, 1); else favs.unshift(currentItem);
            localStorage.setItem('pixiv_favs', JSON.stringify(favs)); updateFavButtonState();
        }
        function renderFavorites() { renderGridItems(getFavs(), document.getElementById('favGrid'), 'fav'); }

        function saveSearchHistory(word, type) {
            let history = JSON.parse(localStorage.getItem('search_history')) || []; history = history.filter(h => !(h.word === word && h.type === type));
            history.unshift({ word, type }); if (history.length > 20) history.pop(); localStorage.setItem('search_history', JSON.stringify(history));
        }
        function saveReadHistory(item, type) {
            let history = JSON.parse(localStorage.getItem('read_history')) || []; history = history.filter(h => !(h.id === item.id && h._type === type));
            item._type = type; history.unshift(item); if (history.length > 30) history.pop(); localStorage.setItem('read_history', JSON.stringify(history));
        }
        function renderHistory() {
            const searchList = document.getElementById('searchHistoryList'), sHistory = JSON.parse(localStorage.getItem('search_history')) || [];
            if (sHistory.length === 0) { searchList.innerHTML = '<p style="color:var(--text-sub); font-size:13px; margin:0;">履歴はありません。</p>'; }
            else {
                searchList.innerHTML = '';
                sHistory.forEach(h => {
                    const div = document.createElement('div'); div.className = 'list-item';
                    div.innerHTML = `<span>[${h.type === 'illust' ? 'イラスト' : '小説'}] <strong>${h.word}</strong></span><button class="delete-small" onclick="event.stopPropagation(); deleteSearchHistory('${h.word}','${h.type}')">削除</button>`;
                    div.onclick = () => { document.getElementById('searchType').value = h.type; startSearch(h.word); };
                    searchList.appendChild(div);
                });
            }
            renderGridItems(JSON.parse(localStorage.getItem('read_history')) || [], document.getElementById('readHistoryGrid'), 'history');
        }
        function deleteSearchHistory(word, type) {
            let history = JSON.parse(localStorage.getItem('search_history')) || []; history = history.filter(h => !(h.word === word && h.type === type));
            localStorage.setItem('search_history', JSON.stringify(history)); renderHistory();
        }
    </script>
</body>

</html>
